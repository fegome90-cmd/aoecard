cards:
  # ═══ Stronghold ══════════════════════════════════════════════════════════
  - id: stronghold_mapuches_frontera_biobio
    name: Frontera del Biobío
    civilization: mapuches
    type: stronghold
    traits: [mapuches]
    strongWeak:
      strong: food
      weak: gold
    text:
      - Puedes incluir cartas Mapuches y Neutrales.
      - Tus Recursos que produzcan Comida producen +1 Comida.
      - Tus Recursos que produzcan Oro producen -1 Oro, mínimo 0.
      - >-
        Una vez por ronda, después de defender con éxito una Provincia o un
        Destino de Bosque, Río, Costa, Lago, Humedal o Paso, puedes enderezar
        una unidad Mapuche participante con coste 3 o menos.
      - La unidad enderezada así no puede declarar Contraataque esa ronda.
      - >-
        Tus unidades Anfibio pueden atacar Destinos de agua como si estuvieran
        adyacentes a una Provincia propia no rota.
      - Tus Tecnologías con coste de Oro cuestan +1 Oro.
    balance:
      status: stable
      notes: Defensa activa, Anfibio, contraataque de frontera.


cards:
  # ═══ Stronghold ══════════════════════════════════════════════════════════
  - id: stronghold_mongoles_campamento_del_kan
    name: Campamento del Kan
    civilization: mongoles
    type: stronghold
    traits: [mongoles]
    strongWeak:
      strong: gold
      weak: wood
    text:
      - Puedes incluir cartas Mongoles y Neutrales.
      - Tus Recursos que produzcan Oro producen +1 Oro.
      - Tus Recursos que produzcan Madera producen -1 Madera, mínimo 0.
      - Una vez por ronda, al pagar una carta Mongol de Caballería, Caballería
        Arquera o Maniobra, puedes pagar hasta 1 Madera como si fueran 2 Oro.
      - Después de ganar una Incursión con Caballería o Caballería Arquera,
        puedes enderezar un Recurso que produzca Oro.
    balance:
      status: stable
      notes: Core stronghold. Strong gold economy fuels cavalry tempo.


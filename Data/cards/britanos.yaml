  # ═══ Stronghold ══════════════════════════════════════════════════════════
  - id: stronghold_britanos_burgo_arcos_largos
    name: Burgo de los Arcos Largos
    civilization: britanos
    type: stronghold
    traits: [britanos]
    strongWeak:
      strong: wood
      weak: food
    text:
      - Puedes incluir cartas Britanas y Neutrales.
      - Tus Recursos que produzcan Madera producen +1 Madera.
      - Tus Recursos que produzcan Comida producen -1 Comida, mínimo 0.
      - Una vez por batalla, si controlas una unidad de Arquería participante
        con mayor Alcance que todas las unidades enemigas, esa unidad obtiene
        +1 Ataque.
      - Tu primera unidad de Caballería cada ronda cuesta +1 Comida.
    balance:
      status: stable
      notes: Posicional y de alcance. Penaliza Caballería.

